server:
  port: 8084
spring:
  application:
    name: chat-service
  datasource:
    url: jdbc:postgresql://localhost:5432/tradearena_chat
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url: 
      defaultZone: http://localhost:8761/eureka
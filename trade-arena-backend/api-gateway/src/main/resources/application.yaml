server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: admin-service
          uri: http://localhost:8082
          predicates:
            - Path=/admin/**

        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notifications/**
          filters:
            - StripPrefix=1

#        - id: notification-service
#          uri: lb://NOTIFICATION-SERVICE
#          predicates:
#            - Path=/notifications/**
#          filters:
#            -
#            - RewritePath=/notifications/(?<segment>.*), /api/notifications/${segment}
    

app:
  jwt:
    secret: TradeArena@SecretKey#2025$JwtAuth!HS256Ready

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
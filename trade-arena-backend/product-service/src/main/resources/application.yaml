server:
  port: 8083

spring:
  application:
    name: product-service

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/tradearena_product
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Jackson — serialize LocalDateTime as ISO string, not array
  jackson:
    serialization:
      write-dates-as-timestamps: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    com.tradearena.productservice: DEBUG

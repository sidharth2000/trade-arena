server:
  port: 8085

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/tradearena_notification
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@example.com
    password: your_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  management:
    endpoints:
      web:
        exposure:
          include: health,info
    endpoint:
      health:
        show-details: always
    health:
      mail:
        enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

trade-arena:
  mail:
    from: "Trade Arena <no-reply@tradearena.com>"

  jwt:
    # Must match API-Gateway/Auth secret (HS256 needs a long enough secret)
    secret: "REPLACE_WITH_A_LONG_RANDOM_256BIT_SECRET_KEY"
    clock-skew-seconds: 60

  cors:
    # If you use React Vite
    allowed-origins: "http://localhost:5173"